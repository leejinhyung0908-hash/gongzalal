<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 기출 문제 풀이</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f0f23;
            --bg-card: #1a1a2e;
            --accent: #00d4ff;
            --accent-hover: #00a8cc;
            --success: #00ff88;
            --error: #ff4757;
            --text: #e8e8e8;
            --text-dim: #8888aa;
        }

        body {
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 15px;
            background: var(--bg-card);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* 타이머 */
        .timer {
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #1a1a2e, #2d2d4a);
            border-radius: 16px;
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .timer.warning {
            border-color: #ff9f43;
            color: #ff9f43;
        }

        .timer.danger {
            border-color: var(--error);
            color: var(--error);
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        /* 문제 카드 */
        .question-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .question-image {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 20px;
            background: #fff;
        }

        .question-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* 선택지 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .option:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--accent);
        }

        .option.selected {
            background: rgba(0, 212, 255, 0.2);
            border-color: var(--accent);
        }

        .option.correct {
            background: rgba(0, 255, 136, 0.2);
            border-color: var(--success);
        }

        .option.wrong {
            background: rgba(255, 71, 87, 0.2);
            border-color: var(--error);
        }

        /* 버튼 */
        .btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #0099cc);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        /* 결과 */
        .result {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 1.2rem;
        }

        .result.correct {
            background: rgba(0, 255, 136, 0.2);
            color: var(--success);
        }

        .result.wrong {
            background: rgba(255, 71, 87, 0.2);
            color: var(--error);
        }

        /* 필터 */
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        select {
            padding: 10px 15px;
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--text-dim);
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }

        /* 로딩 */
        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-dim);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bg-card);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>📝 기출 문제 풀이</h1>
            <p style="color: var(--text-dim);">YOLO 기반 문항 인식 시스템</p>
        </header>

        <!-- 통계 바 -->
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="total-solved">0</div>
                <div class="stat-label">푼 문제</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="correct-count">0</div>
                <div class="stat-label">정답</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="accuracy">0%</div>
                <div class="stat-label">정답률</div>
            </div>
        </div>

        <!-- 필터 -->
        <div class="filters">
            <select id="subject-filter">
                <option value="">모든 과목</option>
            </select>
            <select id="year-filter">
                <option value="">모든 연도</option>
            </select>
            <button class="btn btn-primary" onclick="loadRandomQuestion()">🎲 랜덤 문제</button>
        </div>

        <!-- 타이머 -->
        <div class="timer" id="timer">00:00</div>

        <!-- 문제 영역 -->
        <div id="question-area">
            <div class="loading">
                <div class="spinner"></div>
                <p>문제를 불러오려면 [랜덤 문제] 버튼을 클릭하세요</p>
            </div>
        </div>
    </div>

    <script>
        // 설정
        const API_URL = 'http://localhost:8000/api';
        const USER_ID = 1; // 테스트용 사용자 ID
        const TIME_LIMIT = 120; // 2분 제한

        // 상태
        let currentQuestion = null;
        let selectedAnswer = null;
        let timerInterval = null;
        let elapsedSeconds = 0;
        let solvedIds = [];

        // 세션 통계
        let sessionStats = {
            total: 0,
            correct: 0
        };

        // 초기화
        document.addEventListener('DOMContentLoaded', () => {
            loadFilters();
            updateStatsDisplay();
        });

        // 필터 로드
        async function loadFilters() {
            try {
                const [subjectsRes, yearsRes] = await Promise.all([
                    fetch(`${API_URL}/subjects`),
                    fetch(`${API_URL}/years`)
                ]);

                const subjects = await subjectsRes.json();
                const years = await yearsRes.json();

                const subjectSelect = document.getElementById('subject-filter');
                subjects.subjects.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.textContent = s;
                    subjectSelect.appendChild(opt);
                });

                const yearSelect = document.getElementById('year-filter');
                years.years.forEach(y => {
                    const opt = document.createElement('option');
                    opt.value = y;
                    opt.textContent = y + '년';
                    yearSelect.appendChild(opt);
                });
            } catch (e) {
                console.error('필터 로드 실패:', e);
            }
        }

        // 랜덤 문제 로드
        async function loadRandomQuestion() {
            const subject = document.getElementById('subject-filter').value;
            const year = document.getElementById('year-filter').value;

            const params = new URLSearchParams();
            if (subject) params.append('subject', subject);
            if (year) params.append('year', year);
            if (solvedIds.length > 0) params.append('exclude_ids', solvedIds.join(','));

            const questionArea = document.getElementById('question-area');
            questionArea.innerHTML = '<div class="loading"><div class="spinner"></div><p>문제 불러오는 중...</p></div>';

            try {
                const res = await fetch(`${API_URL}/questions/random?${params}`);

                if (!res.ok) {
                    throw new Error('문제를 찾을 수 없습니다.');
                }

                currentQuestion = await res.json();
                selectedAnswer = null;

                renderQuestion(currentQuestion);
                startTimer();

            } catch (e) {
                questionArea.innerHTML = `
                    <div class="question-card">
                        <p style="text-align: center; color: var(--error);">
                            ❌ ${e.message}<br>
                            <small style="color: var(--text-dim);">서버가 실행 중인지 확인하세요.</small>
                        </p>
                    </div>
                `;
            }
        }

        // 문제 렌더링
        function renderQuestion(q) {
            const questionArea = document.getElementById('question-area');

            // 선택지 (1~5번)
            const options = q.options || {
                '1': '①',
                '2': '②',
                '3': '③',
                '4': '④',
                '5': '⑤'
            };

            const optionsHtml = Object.entries(options).map(([key, text]) => `
                <div class="option" data-answer="${key}" onclick="selectOption(this, '${key}')">
                    <strong>${key}.</strong> ${text}
                </div>
            `).join('');

            questionArea.innerHTML = `
                <div class="question-card">
                    <div class="question-header">
                        <span>📚 ${q.subject || '미분류'}</span>
                        <span>📅 ${q.year || ''}년</span>
                        <span>#${q.question_no || '?'}번</span>
                    </div>

                    ${q.image_url ? `<img class="question-image" src="${q.image_url}" alt="문제 이미지" onerror="this.style.display='none'">` : ''}

                    ${q.question_text ? `<div class="question-text">${q.question_text}</div>` : ''}

                    <div class="options">
                        ${optionsHtml}
                    </div>

                    <div class="btn-group">
                        <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()" disabled>
                            제출하기
                        </button>
                    </div>

                    <div id="result-area"></div>
                </div>
            `;
        }

        // 선택지 선택
        function selectOption(element, answer) {
            // 이미 제출한 경우 선택 불가
            if (document.querySelector('.option.correct') || document.querySelector('.option.wrong')) {
                return;
            }

            // 기존 선택 해제
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });

            // 새 선택
            element.classList.add('selected');
            selectedAnswer = answer;

            // 제출 버튼 활성화
            document.getElementById('submit-btn').disabled = false;
        }

        // 답안 제출
        async function submitAnswer() {
            if (!currentQuestion || !selectedAnswer) return;

            stopTimer();

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = '채점 중...';

            try {
                const res = await fetch(`${API_URL}/questions/${currentQuestion.id}/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        selected_answer: selectedAnswer,
                        time_spent: elapsedSeconds
                    })
                });

                const result = await res.json();

                // 결과 표시
                showResult(result);

                // 통계 업데이트
                sessionStats.total++;
                if (result.is_correct) sessionStats.correct++;
                updateStatsDisplay();

                // 푼 문제 ID 저장
                solvedIds.push(currentQuestion.id);

            } catch (e) {
                console.error('제출 실패:', e);
                submitBtn.disabled = false;
                submitBtn.textContent = '제출하기';
            }
        }

        // 결과 표시
        function showResult(result) {
            // 선택지 하이라이트
            document.querySelectorAll('.option').forEach(opt => {
                const answer = opt.dataset.answer;
                if (answer === result.correct_answer) {
                    opt.classList.add('correct');
                } else if (answer === selectedAnswer && !result.is_correct) {
                    opt.classList.add('wrong');
                }
            });

            // 결과 메시지
            const resultArea = document.getElementById('result-area');
            resultArea.innerHTML = `
                <div class="result ${result.is_correct ? 'correct' : 'wrong'}">
                    ${result.message}
                    <div style="margin-top: 10px; font-size: 0.9rem; color: var(--text-dim);">
                        ⏱️ 소요 시간: ${formatTime(result.time_spent)}
                    </div>
                </div>
                <div class="btn-group" style="margin-top: 15px;">
                    <button class="btn btn-primary" onclick="loadRandomQuestion()">
                        다음 문제 →
                    </button>
                </div>
            `;
        }

        // 타이머
        function startTimer() {
            stopTimer();
            elapsedSeconds = 0;
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                elapsedSeconds++;
                updateTimerDisplay();
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateTimerDisplay() {
            const timerEl = document.getElementById('timer');
            timerEl.textContent = formatTime(elapsedSeconds);

            // 경고 표시
            timerEl.classList.remove('warning', 'danger');
            if (elapsedSeconds >= TIME_LIMIT) {
                timerEl.classList.add('danger');
            } else if (elapsedSeconds >= TIME_LIMIT * 0.75) {
                timerEl.classList.add('warning');
            }
        }

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = seconds % 60;
            return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        // 통계 표시
        function updateStatsDisplay() {
            document.getElementById('total-solved').textContent = sessionStats.total;
            document.getElementById('correct-count').textContent = sessionStats.correct;

            const accuracy = sessionStats.total > 0
                ? Math.round(sessionStats.correct / sessionStats.total * 100)
                : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';
        }
    </script>
</body>

</html>
