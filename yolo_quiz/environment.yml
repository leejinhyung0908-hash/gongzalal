# ============================================================================
# YOLO Quiz Service - Conda 환경 설정
# RTX 3050 (CUDA 11.8) 최적화
# ============================================================================
# 사용법:
#   conda env create -f environment.yml
#   conda activate yolo-quiz
# ============================================================================

name: yolo-quiz
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  # PyTorch + CUDA 11.8
  - pytorch=2.1.0
  - torchvision=0.16.0
  - torchaudio=2.1.0
  - pytorch-cuda=11.8

  # 기본 라이브러리
  - numpy=1.26
  - pillow=10.2
  - tqdm
  - pyyaml

  # pip으로 설치할 패키지
  - pip
  - pip:
    # YOLO
    - ultralytics==8.3.0

    # PDF 처리
    - PyMuPDF==1.24.0

    # 이미지 처리
    - opencv-python==4.9.0.80

    # 데이터베이스
    - psycopg[binary]==3.1.18
    - sqlalchemy==2.0.25

    # 웹 API
    - fastapi==0.109.0
    - uvicorn[standard]==0.27.0
    - python-multipart==0.0.6

    # 유틸리티
    - python-dotenv==1.0.0
    - pydantic==2.5.3


