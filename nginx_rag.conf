server {
    server_name api.leejinhyung.shop;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120;
        proxy_connect_timeout 10;
        proxy_send_timeout 120;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.leejinhyung.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.leejinhyung.shop/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = api.leejinhyung.shop) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name api.leejinhyung.shop;
    return 404;
}
